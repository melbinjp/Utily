<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - WeCanUseAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="workspace-container">
        <header id="workspace-header">
            <h1>Workspace</h1>
        </header>
        <main id="workspace-main">
            <div id="asset-grid">
                <div class="asset-card">
                    <div class="asset-thumbnail"></div>
                    <div class="asset-title">Asset 1</div>
                </div>
                <div class="asset-card">
                    <div class="asset-thumbnail"></div>
                    <div class="asset-title">Asset 2</div>
                </div>
                <div class="asset-card">
                    <div class="asset-thumbnail"></div>
                    <div class="asset-title">Asset 3</div>
                </div>
            </div>
        </main>
        <aside id="workspace-sidebar">
            <h2>Tools</h2>
            <ul id="tool-list">
                <li class="tool-item">Tool 1</li>
                <li class="tool-item">Tool 2</li>
                <li class="tool-item">Tool 3</li>
            </ul>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
